services:
  - type: web
    name: church-deck
    env: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: ESV_API_KEY
        sync: false
      - key: STAFF_PASSWORD_HASH
        sync: false
      - key: SESSION_SIGNING_SECRET
        generateValue: true
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
